<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meus Pedidos - jessi.iphones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --text: #111111;
  --muted: #777;
  --purple: #6d4aff;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
  --radius: 22px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; max-width:100%; overflow-x:hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  padding: 16px 20px;
  background: rgba(245,245,247,.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(0,0,0,.05);
  position: sticky;
  top: 0;
  z-index: 99;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 800px;
  margin: 0 auto;
}
.logo { font-size: 22px; font-weight: 800; text-decoration: none; color: var(--text); }
.logo span { color: var(--purple); }
.nav-links { display: flex; gap: 12px; }
.back-link {
  font-size: 13px;
  color: var(--purple);
  text-decoration: none;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}
.back-link:hover { text-decoration: underline; }
main {
  flex: 1;
  padding: 40px 20px 60px;
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}
.page-header {
  margin-bottom: 28px;
}
.page-title { font-size: 28px; font-weight: 800; margin-bottom: 6px; }
.page-subtitle { color: var(--muted); font-size: 14px; }
.order-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow);
  padding: 22px 26px;
  margin-bottom: 16px;
  border: 1px solid rgba(0,0,0,.04);
  transition: box-shadow .2s, transform .2s;
}
.order-card:hover { box-shadow: 0 16px 40px rgba(0,0,0,.1); transform: translateY(-2px); }
.order-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.order-id {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 4px;
}
.order-product {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.3;
}
.order-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  flex-shrink: 0;
}
.status-pending { background: rgba(237,137,54,.12); color: #c05621; }
.status-awaiting { background: rgba(109,74,255,.1); color: var(--purple); }
.status-paid { background: rgba(72,187,120,.12); color: #276749; }
.order-meta {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.order-meta-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.order-meta-item .label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.order-meta-item .val {
  font-size: 15px;
  font-weight: 600;
}
.order-meta-item .val.price { color: var(--purple); font-size: 17px; font-weight: 800; }
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.dot-pending { background: #c05621; }
.dot-awaiting { background: var(--purple); }
.dot-paid { background: #48bb78; }
.empty-state {
  text-align: center;
  padding: 80px 20px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.empty-icon {
  width: 72px;
  height: 72px;
  border-radius: 22px;
  background: linear-gradient(135deg, rgba(109,74,255,.1), rgba(109,74,255,.05));
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--purple);
  margin: 0 auto 20px;
}
.empty-state h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.empty-state p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #9d6cff, #7f5bff);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  text-decoration: none;
  transition: transform .2s, box-shadow .2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(109,74,255,.35); }
.loading-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.orders-summary {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  color: var(--muted);
  font-size: 14px;
}
.orders-count {
  font-size: 26px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple), #9b7dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
@media (max-width: 600px) {
  .order-card { padding: 18px 16px; }
  .order-header { flex-direction: column; gap: 10px; }
  .order-meta { gap: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="index.html">jessi.<span>iphones</span></a>
    <div class="nav-links">
      <a class="back-link" href="minha-conta.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Minha Conta
      </a>
      <a class="back-link" href="index.html" style="color:var(--muted)">
        Loja
      </a>
    </div>
  </div>
</header>

<main>
  <div class="page-header">
    <h1 class="page-title">Meus Pedidos</h1>
    <p class="page-subtitle">Histórico de todas as suas compras</p>
  </div>

  <div id="loading-state" class="loading-state">Carregando seus pedidos...</div>
  <div id="orders-content" style="display:none;"></div>
</main>

<script>
(function () {
  const AUTH_KEY = 'user-session';

  function getSession() {
    try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch(e) { return null; }
  }

  const session = getSession();
  if (!session || !session.token) {
    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
    return;
  }

  function formatBRL(v) {
    return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function formatDate(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch(e) { return iso; }
  }

  function shortId(id) {
    if (!id) return '—';
    return '#' + id.replace(/-/g, '').slice(0, 8).toUpperCase();
  }

  function statusInfo(status) {
    switch (status) {
      case 'paid':
        return { label: 'Pago', cls: 'status-paid', dotCls: 'dot-paid' };
      case 'awaiting_validation':
        return { label: 'Comprovante enviado', cls: 'status-awaiting', dotCls: 'dot-awaiting' };
      case 'pending':
      default:
        return { label: 'Aguardando pagamento', cls: 'status-pending', dotCls: 'dot-pending' };
    }
  }

  function renderOrders(orders) {
    const container = document.getElementById('orders-content');
    container.style.display = 'block';
    document.getElementById('loading-state').style.display = 'none';

    if (!orders || orders.length === 0) {
      container.innerHTML = '<div class="empty-state">' +
        '<div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>' +
        '<h3>Nenhum pedido encontrado</h3>' +
        '<p>Você ainda não realizou compras. Explore nossa loja!</p>' +
        '<a href="index.html" class="btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Ver iPhones</a>' +
        '</div>';
      return;
    }

    const sortedOrders = [...orders].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    let html = '<div class="orders-summary"><span class="orders-count">' + sortedOrders.length + '</span><span>pedido' + (sortedOrders.length !== 1 ? 's' : '') + ' encontrado' + (sortedOrders.length !== 1 ? 's' : '') + '</span></div>';

    sortedOrders.forEach(function (order) {
      const st = statusInfo(order.status);
      html += '<div class="order-card">' +
        '<div class="order-header">' +
          '<div>' +
            '<div class="order-id">Pedido ' + shortId(order.id) + '</div>' +
            '<div class="order-product">' + escapeHtml(order.productName || order.productId || 'Produto') + '</div>' +
          '</div>' +
          '<span class="order-status ' + st.cls + '"><span class="dot ' + st.dotCls + '"></span>' + st.label + '</span>' +
        '</div>' +
        '<div class="order-meta">' +
          '<div class="order-meta-item"><span class="label">Valor Total</span><span class="val price">' + formatBRL(order.amount) + '</span></div>' +
          '<div class="order-meta-item"><span class="label">Data</span><span class="val">' + formatDate(order.createdAt) + '</span></div>' +
        '</div>' +
      '</div>';
    });

    container.innerHTML = html;
  }

  function escapeHtml(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  async function loadOrders() {
    try {
      const r = await fetch('/api/auth/orders', { headers: { 'x-auth-token': session.token } });
      if (r.status === 401) { localStorage.removeItem(AUTH_KEY); window.location.href = 'login.html'; return; }
      const data = await r.json();
      if (data.success) {
        renderOrders(data.orders);
      } else {
        document.getElementById('loading-state').textContent = 'Erro ao carregar pedidos.';
      }
    } catch(e) {
      document.getElementById('loading-state').textContent = 'Erro de conexão. Recarregue a página.';
    }
  }

  loadOrders();
})();
</script>
<script src="/js/cookie-consent.js"></script>
</body>
</html>
