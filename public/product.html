<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Produto — jessi.iphones</title>
  <meta name="description" id="meta-desc" content=""/>
  <meta property="og:title" id="og-title" content=""/>
  <meta property="og:description" id="og-desc" content=""/>
  <meta property="og:image" id="og-image" content=""/>
  <meta property="og:type" content="product"/>
  <meta property="og:site_name" content="jessi.iphones"/>
  <meta name="twitter:card" content="summary_large_image"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:       #2563EB;
      --blue-dark:  #1D4ED8;
      --blue-light: #EFF6FF;
      --yellow:     #F59E0B;
      --green:      #16A34A;
      --green-bg:   #F0FDF4;
      --red:        #DC2626;
      --bg:         #F1F5F9;
      --card:       #FFFFFF;
      --text:       #0F172A;
      --text-2:     #475569;
      --muted:      #94A3B8;
      --border:     #E2E8F0;
      --radius:     12px;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
      --shadow-md:  0 8px 24px rgba(15,23,42,.10);
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; max-width: 100%; overflow-x: hidden; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F3F6FB;
      color: var(--text);
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }
    img { max-width: 100%; height: auto; }

    /* ===== HEADER ===== */
    .site-header {
      background: var(--blue);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -.01em; }
    .site-logo span { color: var(--yellow); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .hdr-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 16px; border-radius: 7px;
      font-size: 13px; font-weight: 600; border: none; cursor: pointer;
      transition: background .2s, transform .15s; text-decoration: none;
    }
    .hdr-btn:hover { transform: translateY(-1px); }
    .hdr-btn-outline { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.25); }
    .hdr-btn-outline:hover { background: rgba(255,255,255,.25); }
    .hdr-btn-cart { background: var(--yellow); color: #1a1a2e; }
    .hdr-btn-cart:hover { background: #D97706; }

    /* ===== SHELL ===== */
    .page-shell { max-width: 1280px; margin: 0 auto; padding: 20px 20px 60px; }

    /* ===== BREADCRUMB ===== */
    .breadcrumb {
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
      font-size: .875rem; color: var(--text-2); margin-bottom: 20px;
      padding: 12px 16px; background: #fff; border-radius: 10px;
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .breadcrumb a { color: var(--blue); font-weight: 600; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--muted); }
    .breadcrumb-current { color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }

    /* ===== PRODUCT TOP GRID ===== */
    .product-top-grid {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 24px;
      align-items: start;
      margin-bottom: 28px;
      max-width: 100%;
      min-width: 0;
    }
    .gallery-panel, .sidebar-panel { min-width: 0; max-width: 100%; }

    /* ===== GALLERY ===== */
    .gallery-panel { display: flex; flex-direction: column; gap: 0; }
    .gallery-card {
      background: #fff; border-radius: 20px; overflow: hidden;
      border: 1px solid var(--border); box-shadow: var(--shadow-md);
    }
    .gallery-main {
      position: relative; overflow: hidden;
      background: linear-gradient(160deg, #fff 0%, #f8fbff 100%);
      min-height: 420px; display: flex; align-items: center; justify-content: center;
      cursor: zoom-in;
    }
    .gallery-main img {
      width: 100%; max-width: 100%; max-height: 480px; object-fit: contain;
      padding: 20px; transition: transform .35s ease;
      display: block; height: auto;
    }
    @media (hover: hover) { .gallery-main:hover img { transform: scale(1.08); } }
    .gallery-nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.9); border: 1px solid var(--border);
      border-radius: 50%; width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .2s, box-shadow .2s; z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }
    .gallery-nav-btn:hover { background: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .gallery-nav-btn.prev { left: 10px; }
    .gallery-nav-btn.next { right: 10px; }
    .gallery-nav-btn svg { width: 16px; height: 16px; stroke: var(--text); }
    .gallery-fab {
      position: absolute; z-index: 3;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.92); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.14);
      transition: background .2s, box-shadow .2s;
    }
    .gallery-fab:hover { background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.2); }
    .gallery-fab svg { width: 18px; height: 18px; stroke: #333; }
    .gallery-fab-heart { top: 14px; right: 14px; }
    .gallery-fab-share { bottom: 14px; right: 14px; }
    .gallery-badge-promo {
      position: absolute; top: 14px; left: 14px;
      background: var(--red); color: #fff;
      font-size: 12px; font-weight: 800; padding: 4px 10px; border-radius: 6px;
      letter-spacing: .03em; z-index: 2;
    }
    .gallery-thumbs {
      display: flex; gap: 8px; padding: 12px;
      background: #f8fbff; border-top: 1px solid var(--border);
      overflow-x: auto; scrollbar-width: thin;
    }
    .gallery-thumbs::-webkit-scrollbar { height: 4px; }
    .gallery-thumbs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .thumb-btn {
      flex-shrink: 0; width: 68px; height: 68px;
      border-radius: 8px; border: 2px solid transparent;
      background: #fff; cursor: pointer; overflow: hidden;
      transition: border-color .2s, transform .15s;
    }
    .thumb-btn:hover, .thumb-btn.active { border-color: var(--blue); transform: translateY(-1px); }
    .thumb-btn img { width: 100%; height: 100%; object-fit: contain; padding: 4px; display: block; }

    /* Empty gallery */
    .gallery-empty {
      width: 100%; min-height: 420px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: var(--muted); gap: 12px;
      background: var(--bg); border-radius: 20px;
    }

    /* ===== SIDEBAR / PURCHASE PANEL ===== */
    .sidebar-panel { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: #fff; border-radius: 16px;
      border: 1px solid var(--border); padding: 18px 20px;
      box-shadow: var(--shadow-sm); max-width: 100%; min-width: 0;
    }

    /* Product identity */
    .product-condition-row {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .badge-condition {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; padding: 3px 9px; border-radius: 5px;
      background: var(--blue-light); color: var(--blue);
    }
    .badge-sold {
      font-size: 12px; color: var(--text-2);
    }
    .product-name {
      font-size: clamp(1.15rem, 2.5vw, 1.5rem); font-weight: 700;
      line-height: 1.2; margin: 0 0 12px; color: var(--text);
      word-break: break-word; overflow-wrap: anywhere;
    }
    .rating-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      font-size: .875rem; color: var(--text-2); margin-bottom: 10px;
    }
    .stars-filled { color: var(--yellow); letter-spacing: .05em; }
    .rating-val { font-weight: 700; color: var(--text); }
    .rating-count { color: var(--text-2); }
    .seller-row { font-size: .85rem; color: var(--text-2); }
    .seller-row strong { color: var(--blue); font-weight: 600; }

    /* Price */
    .daily-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #FFF3CD; color: #92400E; border-radius: 5px;
      padding: 4px 10px; font-size: 11.5px; font-weight: 700;
      margin-bottom: 10px;
    }
    .price-original {
      color: var(--muted); font-size: .9rem;
      text-decoration: line-through; margin-bottom: 2px;
    }
    .price-main-row {
      display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .price-current {
      font-size: clamp(1.9rem, 4vw, 2.4rem); font-weight: 800;
      line-height: 1; color: var(--green); letter-spacing: -.03em;
    }
    .price-discount-badge {
      display: inline-flex; align-items: center;
      background: var(--green-bg); color: var(--green);
      border: 1px solid #BBF7D0; border-radius: 6px;
      padding: 4px 10px; font-size: .8rem; font-weight: 700;
      margin-bottom: 4px;
    }
    .installment-row {
      font-size: .875rem; color: var(--text-2);
      display: flex; align-items: center; gap: 5px; margin-bottom: 8px;
    }
    .installment-row strong { color: var(--text); }
    .gift-row {
      font-size: .85rem; color: var(--green); font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .shipping-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #E5F6ED; color: #00A650; border-radius: 5px;
      padding: 4px 10px; font-size: 12px; font-weight: 600; margin-top: 8px;
    }
    .shipping-calc {
      font-size: .85rem; color: var(--text-2); margin-top: 8px;
    }

    /* Variations */
    .section-label {
      font-size: .8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--text-2); margin-bottom: 8px;
    }
    .variation-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .variation-chip {
      padding: 6px 14px; border-radius: 8px;
      border: 2px solid var(--border); background: var(--bg);
      font-size: .875rem; font-weight: 500; color: var(--text);
      cursor: pointer; transition: border-color .2s, background .2s;
      word-break: break-word; overflow-wrap: anywhere; max-width: 100%;
    }
    .variation-chip.active, .variation-chip:hover {
      border-color: var(--blue); background: var(--blue-light); color: var(--blue);
    }
    .variation-chip[disabled] { opacity: .4; cursor: not-allowed; pointer-events: none; }

    /* ── Color variation cards (ML-style) ── */
    .var-color-cards { display: flex; flex-wrap: wrap; gap: 8px; }
    .var-color-card {
      border: 2px solid var(--border); border-style: dashed; border-radius: 10px;
      padding: 8px 6px; cursor: pointer; width: 86px;
      text-align: center; background: #fff;
      transition: border-color .2s, box-shadow .2s;
      flex-shrink: 0;
    }
    .var-color-card.active {
      border-style: solid; border-color: #3483FA;
      box-shadow: 0 0 0 1px #3483FA22;
    }
    .var-color-card:not(.active):hover { border-color: #aaa; }
    .var-color-card[disabled] { opacity: .55; cursor: not-allowed; pointer-events: none; }
    .var-color-card img {
      width: 56px; height: 56px; object-fit: contain;
      display: block; margin: 0 auto 5px;
    }
    .vcc-name   { font-size: .75rem; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .vcc-price  { font-size: .79rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .vcc-status { font-size: .67rem; color: var(--text-2); line-height: 1.3; }

    /* Stock */
    .stock-row {
      display: flex; align-items: center; gap: 8px;
      font-size: .875rem; font-weight: 600;
    }
    .stock-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .stock-dot.low { background: var(--red); }
    .stock-dot.ok  { background: var(--green); }

    /* Actions */
    .btn {
      border: none; cursor: pointer; border-radius: 10px;
      padding: 14px 20px; font-weight: 700; font-size: .95rem;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .15s, background .2s, box-shadow .2s; width: 100%;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .btn-primary { background: var(--yellow); color: #1a1a2e; }
    .btn-primary:hover { background: #D97706; }
    .btn-secondary { background: var(--blue); color: #fff; }
    .btn-secondary:hover { background: var(--blue-dark); }
    .btn-ghost {
      background: var(--bg); color: var(--text-2);
      border: 1px solid var(--border); flex: 1;
    }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
    .btn-ml-add { background: #EBF2FF; color: #3483FA; border: 1px solid #C2D9FF; }
    .btn-ml-add:hover { background: #D6E8FF; border-color: #3483FA; }
    .actions-grid { display: flex; flex-direction: column; gap: 10px; }
    .actions-secondary { display: flex; gap: 10px; }

    /* Benefits */
    .benefits-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .benefit-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 12px; border-radius: 12px;
      background: var(--bg); border: 1px solid var(--border);
    }
    .benefit-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--blue-light); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
    }
    .benefit-icon svg { width: 18px; height: 18px; stroke: var(--blue); }
    .benefit-text strong { display: block; font-size: .85rem; font-weight: 700; color: var(--text); }
    .benefit-text span { font-size: .78rem; color: var(--text-2); }

    /* ===== FULL-WIDTH SECTIONS ===== */
    .section { background: #fff; border-radius: 18px; border: 1px solid var(--border); padding: 24px 28px; box-shadow: var(--shadow-sm); margin-bottom: 20px; max-width: 100%; overflow: hidden; }
    .section-title {
      font-size: 1.15rem; font-weight: 800; color: var(--text);
      margin: 0 0 20px; display: flex; align-items: center; gap: 10px;
    }
    .section-title::before {
      content: ''; display: inline-block; width: 4px; height: 20px;
      background: var(--blue); border-radius: 2px; flex-shrink: 0;
    }

    /* Highlight cards (O que você precisa saber) */
    .highlight-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    }
    .highlight-card {
      padding: 16px; border-radius: 14px;
      background: linear-gradient(160deg, #f8fbff 0%, #eff6ff 100%);
      border: 1px solid rgba(37,99,235,.12);
    }
    .highlight-card .h-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--blue-light); display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .highlight-card .h-icon svg { width: 20px; height: 20px; stroke: var(--blue); }
    .highlight-card .h-label { font-size: .75rem; color: var(--text-2); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .highlight-card .h-value { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.25; word-break: break-word; overflow-wrap: anywhere; }

    /* Description */
    .description-content { color: var(--text-2); line-height: 1.85; font-size: .94rem; word-break: break-word; overflow-wrap: anywhere; }
    .description-content p { margin: 0 0 12px; }
    .description-content ul { margin: 0 0 12px; padding-left: 20px; }
    .description-content li { margin-bottom: 6px; }
    .desc-toggle-btn {
      margin-top: 16px; background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 20px; cursor: pointer;
      font-size: .875rem; font-weight: 600; color: var(--blue);
      display: flex; align-items: center; gap: 6px;
      transition: background .2s, border-color .2s;
    }
    .desc-toggle-btn:hover { background: var(--blue-light); border-color: var(--blue); }

    /* Specs table */
    .specs-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .specs-table tr:nth-child(even) td, .specs-table tr:nth-child(even) th { background: #F8FAFC; }
    .specs-table th, .specs-table td { padding: 11px 14px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; word-break: break-word; overflow-wrap: anywhere; }
    .specs-table th { color: var(--text-2); width: 38%; font-weight: 600; }
    .specs-table td { color: var(--text); font-weight: 500; }
    .specs-table tr.hidden-row { display: none; }
    .specs-toggle-btn {
      margin-top: 16px; background: none; border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 20px; cursor: pointer;
      font-size: .875rem; font-weight: 600; color: var(--blue);
      display: flex; align-items: center; gap: 6px;
      transition: background .2s; width: 100%; justify-content: center;
    }
    .specs-toggle-btn:hover { background: var(--blue-light); }

    /* Reviews */
    .reviews-summary { display: flex; gap: 28px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
    .reviews-big-score { text-align: center; }
    .reviews-big-score .score-num { font-size: 4rem; font-weight: 800; color: var(--text); line-height: 1; }
    .reviews-big-score .score-stars { font-size: 1.3rem; color: var(--yellow); }
    .reviews-big-score .score-count { font-size: .85rem; color: var(--text-2); margin-top: 4px; }
    .reviews-bars { flex: 1; min-width: min(200px, 100%); max-width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .bar-row { display: flex; align-items: center; gap: 10px; font-size: .82rem; }
    .bar-label { color: var(--text-2); width: 14px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--yellow); border-radius: 4px; transition: width .6s ease; }
    .bar-count { color: var(--text-2); width: 34px; text-align: right; flex-shrink: 0; }
    .reviews-list { display: flex; flex-direction: column; gap: 16px; }
    .review-item {
      padding: 16px; border-radius: 14px;
      background: var(--bg); border: 1px solid var(--border);
    }
    .review-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .review-stars { color: var(--yellow); font-size: .95rem; }
    .review-date { font-size: .8rem; color: var(--muted); margin-left: auto; }
    .review-text { font-size: .9rem; color: var(--text-2); line-height: 1.7; margin-bottom: 10px; word-break: break-word; overflow-wrap: anywhere; }
    .review-photos { display: flex; flex-wrap: wrap; gap: 8px; }
    .review-photos img {
      width: 72px; height: 72px; max-width: 72px; object-fit: cover;
      border-radius: 8px; border: 1px solid var(--border); cursor: pointer;
      display: block; flex-shrink: 0;
    }
    .reviews-placeholder { color: var(--muted); font-size: .9rem; font-style: italic; padding: 20px 0; text-align: center; }

    /* Customer gallery */
    .customer-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
    .customer-gallery-grid img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: 10px; border: 1px solid var(--border); cursor: pointer;
      transition: transform .2s, box-shadow .2s;
    }
    .customer-gallery-grid img:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(0,0,0,.15); }

    /* Q&A */
    .qa-input-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .qa-input {
      flex: 1; min-width: min(200px, 100%); max-width: 100%; padding: 11px 16px;
      border: 1px solid var(--border); border-radius: 10px;
      font-size: .9rem; color: var(--text); outline: none;
      transition: border-color .2s;
    }
    .qa-input:focus { border-color: var(--blue); }
    .qa-submit {
      background: var(--blue); color: #fff; border: none;
      border-radius: 10px; padding: 11px 20px; cursor: pointer;
      font-size: .875rem; font-weight: 600;
      transition: background .2s;
    }
    .qa-submit:hover { background: var(--blue-dark); }
    .qa-placeholder { font-size: .875rem; color: var(--muted); text-align: center; padding: 24px 0; }

    /* Related */
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(180px, 100%), 1fr)); gap: 14px; }
    .related-card {
      background: #fff; border-radius: 14px; overflow: hidden;
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
      transition: box-shadow .2s, transform .2s; cursor: pointer;
      text-decoration: none; display: block; color: inherit;
    }
    .related-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .related-card img { width: 100%; aspect-ratio: 1; object-fit: contain; padding: 12px; background: #f8fbff; display: block; }
    .related-card-body { padding: 12px; }
    .related-card-name { font-size: .85rem; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .related-card-price { font-size: 1rem; font-weight: 800; color: var(--green); }
    .related-card-original { font-size: .8rem; color: var(--muted); text-decoration: line-through; }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.88); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .lightbox-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,.1); border: none; color: #fff;
      width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
      font-size: 1.3rem; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,.2); }

    /* Error / loading */
    .empty-state {
      text-align: center; padding: 60px 20px;
      background: #fff; border-radius: var(--radius);
      border: 1px solid var(--border); color: var(--text-2);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1100px) {
      .product-top-grid { grid-template-columns: 1fr 380px; }
      .highlight-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 960px) {
      .product-top-grid { grid-template-columns: 1fr; }

      .highlight-grid { grid-template-columns: repeat(2, 1fr); }

    @media (max-width: 680px) {

      .card { padding: 16px 16px; }

      .benefits-grid { grid-template-columns: 1fr; }
      .reviews-summary { flex-direction: column; align-items: stretch; gap: 16px; }
      .reviews-bars { min-width: 0; width: 100%; }
      .actions-secondary { flex-direction: column; }
      .related-grid { grid-template-columns: repeat(2, 1fr); }
      .site-header { padding: 10px 14px; }
      .breadcrumb { font-size: .8rem; }
    }
    @media (max-width: 480px) {
      .hdr-btn-label { display: none; }
      .hdr-btn { padding: 9px 12px; gap: 0; min-width: 0; }
      .site-logo { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    }
    @media (max-width: 414px) {
      .related-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .customer-gallery-grid { grid-template-columns: repeat(3, 1fr); }

    @media (max-width: 360px) {

    /* ===== MERCADO LIVRE COMPARISON CARD ===== */

      battery:  `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/></svg>`,

      face:     `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>`,

      share:    `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`,
      cart:     `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>`,
      buy:      `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
      chevDown: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
      chevUp:   `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>`,
      gift:     `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>`,
      card:     `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`,
      chevL:    `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
      chevR:    `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
    };

    /* ── UTILITIES ── */
    const fmt = window.formatCurrency;

    const starsHtml = (n, size = '1rem') => {
      const filled = Math.max(0, Math.min(5, Math.round(n)));
      return `<span class="stars-filled" style="font-size:${size}">${'★'.repeat(filled)}${'☆'.repeat(5 - filled)}</span>`;
    };

    const formatDescription = (text) => {
      if (!text) return '';
      const lines = text.split('\n');
      let html = '';
      let inList = false;
      for (const raw of lines) {
        const line = raw.trim();
        if (!line) {
          if (inList) { html += '</ul>'; inList = false; }
          continue;
        }
        if (line.startsWith('•') || line.startsWith('-')) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${line.replace(/^[•\-]\s*/, '')}</li>`;
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<p>${line}</p>`;
        }
      }
      if (inList) html += '</ul>';
      return html;
    };

    window.openLightbox = (src) => {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
    };
    window.closeLightbox = () => document.getElementById('lightbox').classList.remove('open');

    /* ── SEO ── */
    const updateSEO = (p, imgSrc) => {
      const title = `${p.name} — jessi.iphones`;
      const desc = `${p.condition} · ${p.storage || ''} · ${p.color || ''} · ${fmt(p.price)} em até 12x sem juros. ${(p.description || '').slice(0, 120)}...`;
      document.getElementById('page-title').textContent = title;
      document.getElementById('meta-desc').content = desc;
      document.getElementById('og-title').content = title;
      document.getElementById('og-desc').content = desc;
      if (imgSrc) document.getElementById('og-image').content = imgSrc;

      const existing = document.getElementById('json-ld');
      const schema = {
        '@context': 'https://schema.org/',
        '@type': 'Product',
        name: p.name,
        description: (p.description || '').slice(0, 500),
        brand: { '@type': 'Brand', name: p.specs?.Marca || 'Apple' },
        sku: p.id,
        offers: {
          '@type': 'Offer',
          priceCurrency: 'BRL',
          price: p.price,
          availability: p.stock > 0 ? 'https://schema.org/InStock' : 'https://schema.org/OutOfStock',
          seller: { '@type': 'Organization', name: p.seller || 'jessi.iphones' }
        },
        aggregateRating: p.rating ? {
          '@type': 'AggregateRating',
          ratingValue: p.rating,
          reviewCount: p.reviews || 0
        } : undefined
      };
      if (existing) { existing.textContent = JSON.stringify(schema); }
      else {
        const s = document.createElement('script');
        s.type = 'application/ld+json';
        s.id = 'json-ld';
        s.textContent = JSON.stringify(schema);
        document.head.appendChild(s);
      }
    };

    /* ── ADD TO CART ── */
    window.addToCart = async (productId) => {
      try {
        const r = await fetch(`/api/products/${encodeURIComponent(productId)}`);
        if (!r.ok) throw new Error();
        const product = await r.json();
        if (typeof getOrCreateCardExtras === 'function') {
          const ex = getOrCreateCardExtras(productId);
          product.descontoHoje = ex.descontoHoje;
          product.brinde = ex.brinde;
          product.freteGratis = ex.freteGratis;
        }
        if (window.cart) window.cart.addItem(product, 1);
      } catch {}
    };

    const startChat = async (model) => {
      try {

                  <span class="bar-label">${d.star}</span>
                  <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                  <span class="bar-count">${d.count}</span>
                </div>`;
              }).join('')}
            </div>
          </div>
          <div class="reviews-list" id="reviews-lazy-section">
            ${reviewsList.length === 0
              ? '<p class="reviews-placeholder">Nenhuma avaliação textual disponível ainda.</p>'
              : '<p class="reviews-placeholder" style="padding:12px 0;">Carregando avaliações...</p>'}
          </div>
        </section>

        <!-- FOTOS DOS COMPRADORES -->
        ${customerImgs.length ? `
        <section class="section" aria-labelledby="gallery-title">
          <h2 class="section-title" id="gallery-title">Fotos dos compradores</h2>
          <div class="customer-gallery-grid">
            ${customerImgs.map((img, i) => `<img src="${img}" alt="Foto do comprador ${i+1}" loading="lazy" onclick="openLightbox('${img}')">`).join('')}
          </div>
        </section>` : ''}

        <!-- PERGUNTAS E RESPOSTAS -->
        <section class="section" aria-labelledby="qa-title">
          <h2 class="section-title" id="qa-title">Perguntas e respostas</h2>
          <div class="qa-input-row">
            <input class="qa-input" type="text" id="qa-input" placeholder="Escreva sua pergunta sobre o produto..." maxlength="300" aria-label="Digite sua pergunta"/>
            <button class="qa-submit" onclick="handleQA()">Perguntar</button>
          </div>
          <p class="qa-placeholder">Nenhuma pergunta ainda. Seja o primeiro a perguntar!</p>
        </section>

        <!-- RELACIONADOS -->
        <section class="section" aria-labelledby="related-title">
          <h2 class="section-title" id="related-title">Você também pode gostar</h2>
          <div class="related-grid" id="related-container">
            <p style="color:var(--muted);font-size:.875rem;grid-column:1/-1;">Carregando produtos relacionados...</p>
          </div>
        </section>
      `;

      /* Wire up interactions */
      setupGallery(images);
      loadMLVariations(product, storeDiscount);
      setupSpecsToggle(specEntries.length);
      setupDescToggle();
      setupLazyReviews(reviewsList);

      /* Viewport overflow audit */
      setTimeout(() => {
        const vw = window.innerWidth;
        const offenders = [...document.querySelectorAll('*')].filter(el => {
          try { return el.scrollWidth > vw + 2; } catch { return false; }
        });
        if (offenders.length === 0) {
          console.log('[Viewport Audit] OK — nenhum overflow detectado em', vw + 'px');
        } else {
          offenders.forEach(el => {
            const id = el.id ? '#' + el.id : '';
            const cls = typeof el.className === 'string' ? '.' + el.className.trim().split(/\s+/).join('.') : '';
            console.warn('[Viewport Audit OVERFLOW]', el.tagName + (id || cls).slice(0, 60), `scrollWidth=${el.scrollWidth}px > vw=${vw}px`);
          });
        }
      }, 1000);
    };

    /* ── VARIATIONS — agrupa produtos irmãos pelo campo "model" do JSON ── */

    const loadMLVariations = (product, storeDiscount) => {
      const card = document.getElementById('variations-card');
      if (!card) return;

      const isValidImg = (s) => typeof s === 'string' && s.startsWith('http');

      /* Todos os produtos do mesmo modelo */
      const siblings = _catalog.filter(p => p.model && p.model === product.model);

      /* Sem irmãos → chips estáticos */
      if (siblings.length <= 1) {
        card.innerHTML = `
          <div style="margin-bottom:14px;">
            <div class="section-label">Cor</div>
            <div class="variation-chips">
              <button class="variation-chip active">${product.color || 'Padrão'}</button>
            </div>
          </div>
          <div>
            <div class="section-label">Armazenamento</div>
            <div class="variation-chips">
              <button class="variation-chip active">${product.storage || 'Padrão'}</button>
            </div>
          </div>`;
        return;
      }

      /* Valores únicos, preservando ordem de aparição no JSON */
      const colors   = [...new Set(siblings.map(p => p.color).filter(Boolean))];
      const storages = [...new Set(siblings.map(p => p.storage).filter(Boolean))];

      /* Seleção atual = produto aberto */
      const sel = { color: product.color || colors[0], storage: product.storage || storages[0] };

      /*
       * Chip de COR disponível se QUALQUER irmão com aquela cor tem estoque.
       * (não importa o storage atual — Mercado Livre faz isso também)
       */
      const colorOk   = (c) => siblings.some(p => p.color   === c && (p.stock ?? 0) > 0);
      const storageOk = (s) => siblings.some(p => p.storage === s && (p.stock ?? 0) > 0);

      /* Busca exata; se não achar, pega o primeiro irmão disponível com aquele atributo */
      const findBestSibling = (type, val) => {
        if (type === 'color') {
          return siblings.find(p => p.color === val && p.storage === sel.storage)
              || siblings.find(p => p.color === val && (p.stock ?? 0) > 0)
              || siblings.find(p => p.color === val);
        }
        return siblings.find(p => p.storage === val && p.color === sel.color)
            || siblings.find(p => p.storage === val && (p.stock ?? 0) > 0)
            || siblings.find(p => p.storage === val);
      };

      /* Aplica irmão: galeria, nome, preço, estoque, URL e botões */
      const applyVariant = (p) => {
        if (!p) return;

        /* URL sem reload */
        const u = new URL(window.location.href);
        u.searchParams.set('id', p.id);
        history.pushState({ id: p.id }, '', u.toString());

        /* Nome */
        const elName = document.querySelector('.product-name');
        if (elName) elName.textContent = p.name;

        /* Galeria */
        const imgs = (Array.isArray(p.images) ? p.images : []).filter(isValidImg);
        if (window._galleryUpdate) window._galleryUpdate(imgs.length ? imgs : (product.images || []).filter(isValidImg));

        /* Preço */
        const mlPrice   = p.price;
        const basePrice = storeDiscount > 0
          ? Math.round(mlPrice * (1 - storeDiscount / 100) * 100) / 100
          : mlPrice;
        const origPrice = storeDiscount > 0 ? mlPrice : (p.priceOriginal || mlPrice);
        const promo     = storeDiscount > 0 ? storeDiscount
          : Math.round((1 - mlPrice / (p.priceOriginal || mlPrice)) * 100);
        const install   = (basePrice / 12).toFixed(2).replace('.', ',');

        const elOrig   = document.getElementById('price-original');
        const elCurr   = document.getElementById('price-current');
        const elBadge  = document.getElementById('price-discount-badge');
        const elInst   = document.getElementById('price-installment');
        const galBadge = document.querySelector('.gallery-badge-promo');

        if (elOrig)   { elOrig.textContent   = `De: ${fmt(origPrice)}`; elOrig.style.display   = origPrice > basePrice ? '' : 'none'; }
        if (elCurr)   elCurr.textContent     = fmt(basePrice);
        if (elBadge)  { elBadge.textContent  = `${promo}% OFF`;         elBadge.style.display  = promo > 0 ? '' : 'none'; }
        if (elInst)   elInst.innerHTML       = `${IC.card} ou em até <strong>12x de R$ ${install}</strong> sem juros`;
        if (galBadge) { galBadge.textContent = `${promo}% OFF`;         galBadge.style.display = promo > 0 ? '' : 'none'; }

        /* Estoque */
        const qty     = p.stock ?? 0;
        const elStock = document.getElementById('stock-display');
        if (elStock) {
          const low = qty <= 3;
          elStock.innerHTML = `<div class="stock-row">
            <span class="stock-dot ${low ? 'low' : 'ok'}"></span>
            ${low
              ? `<span style="color:var(--red);font-weight:600;">Últimas ${qty} unidade${qty !== 1 ? 's' : ''} disponível${qty !== 1 ? 'is' : ''}</span>`
              : `<span style="color:var(--green);">Em estoque — ${qty} disponível${qty !== 1 ? 'is' : ''}</span>`}
          </div>`;
        }

        /* Botões de compra */
        document.querySelectorAll('[onclick*="buyNow("]').forEach(b =>
          b.setAttribute('onclick', `buyNow('${p.id}')`));
        document.querySelectorAll('[onclick*="addToCart("]').forEach(b =>
          b.setAttribute('onclick', `addToCart('${p.id}')`));

        /* Card Mercado Livre */
        const newMlUrl = p.url || (String(p.id).startsWith('MLB') ? 'https://www.mercadolivre.com.br/p/' + p.id : '');
        const elMlML    = document.getElementById('ml-price-ml');
        const elMlStore = document.getElementById('ml-price-store');
        const elMlBtn   = document.getElementById('ml-link-btn');
        if (elMlML)    elMlML.textContent    = fmt(origPrice);
        if (elMlStore) elMlStore.textContent = fmt(basePrice);
        if (elMlBtn && newMlUrl) elMlBtn.setAttribute('onclick', `window.open('${newMlUrl}', '_blank')`);
      };

      /* Renderiza chips */
      const renderChips = () => {
        let html = '';

        if (colors.length > 1) {
          const cards = colors.map(c => {
            const active  = c === sel.color;
            const avail   = colorOk(c);
            const sib     = siblings.find(p => p.color === c) || null;
            const img     = sib ? (Array.isArray(sib.images) ? sib.images : []).find(isValidImg) || '' : '';
            const price   = sib ? fmt(sib.price) : '';
            const status  = active ? 'Disponível'
                          : avail  ? 'Disponível em<br>outras opções'
                          :          'Sem estoque';
            return `<button
              class="var-color-card${active ? ' active' : ''}"
              data-type="color" data-val="${c.replace(/"/g, '&quot;')}"
              ${!avail ? 'disabled' : ''}
            >${img
              ? `<img src="${img}" alt="${c}" loading="lazy"/>`
              : `<div style="width:56px;height:56px;margin:0 auto 5px;background:var(--bg);border-radius:6px;"></div>`}
              <div class="vcc-name">${c}</div>
              ${price ? `<div class="vcc-price">${price}</div>` : ''}
              <div class="vcc-status">${status}</div>
            </button>`;
          }).join('');
          html += `<div style="margin-bottom:16px;">
            <div class="section-label">Cor<span style="font-weight:500;text-transform:none;color:var(--text);margin-left:6px;letter-spacing:0">${sel.color || ''}</span></div>
            <div class="var-color-cards">${cards}</div>
          </div>`;
        }

        if (storages.length > 1) {
          const chips = storages.map(s => {
            const active = s === sel.storage;
            const avail  = storageOk(s);
            return `<button class="variation-chip${active ? ' active' : ''}"
              data-type="storage" data-val="${s.replace(/"/g, '&quot;')}"
              ${!avail ? 'disabled title="Sem estoque"' : ''}>${s}</button>`;
          }).join('');
          html += `<div>
            <div class="section-label">Armazenamento<span style="font-weight:500;text-transform:none;color:var(--text);margin-left:6px;letter-spacing:0">${sel.storage || ''}</span></div>
            <div class="variation-chips">${chips}</div>
          </div>`;
        }

        /* Se só há 1 cor e 1 storage, mostra mesmo assim para o usuário saber o que está selecionado */
        if (!html) {
          html = `
            <div style="margin-bottom:14px;">
              <div class="section-label">Cor</div>
              <div class="variation-chips"><button class="variation-chip active">${sel.color || 'Padrão'}</button></div>
            </div>
            <div>
              <div class="section-label">Armazenamento</div>
              <div class="variation-chips"><button class="variation-chip active">${sel.storage || 'Padrão'}</button></div>
            </div>`;
        }

        card.innerHTML = html;

        card.querySelectorAll('.variation-chip:not([disabled])').forEach(btn => {
          btn.addEventListener('click', () => {
            const type = btn.dataset.type;
            const val  = btn.dataset.val;
            const match = findBestSibling(type, val);
            if (match) {
              /* Sincroniza seleção com o produto encontrado */
              sel.color   = match.color   || sel.color;
              sel.storage = match.storage || sel.storage;
              applyVariant(match);
            }
            renderChips();
          });
        });
      };

      renderChips();
    };

    /* ── Q&A ── */
    window.handleQA = () => {
      const input = document.getElementById('qa-input');
      if (!input || !input.value.trim()) { input?.focus(); return; }
      alert(`Sua pergunta foi enviada: "${input.value.trim()}"\nVocê será notificado quando houver uma resposta.`);
      input.value = '';
    };

    /* ── FETCH ── */
    const fetchProduct = async () => {
      if (!PRODUCT_ID) {
        root.innerHTML = `<div class="empty-state"><p style="font-size:1.1rem;font-weight:600;color:var(--red);">ID do produto não encontrado na URL.</p><a href="index.html" class="btn btn-primary" style="display:inline-flex;margin-top:16px;width:auto;">Voltar à loja</a></div>`;
        return;
      }
      try {
        const [catalogRes, configRes] = await Promise.all([
          fetch(`/api/catalog/product/${PRODUCT_ID}`),
          fetch('/config.json').catch(() => null)
        ]);
        if (!catalogRes.ok) throw new Error('Produto não encontrado');
        const { product, siblings, related } = await catalogRes.json();
        const config = (configRes?.ok) ? await configRes.json() : {};
        const storeDiscount = Math.max(0, Math.min(99, Number(config.descontoPadrao) || 0));

        // siblings serve para as variações de cor/armazenamento — sem baixar o catálogo todo
        _catalog = siblings && siblings.length ? siblings : [product];

        renderProduct(product, storeDiscount);
        loadRelatedFromData(related || []);
      } catch (e) {
        root.innerHTML = `<div class="empty-state"><p style="font-size:1.1rem;font-weight:600;color:var(--red);">Erro ao carregar o produto.</p><button class="btn btn-primary" style="display:inline-flex;margin-top:16px;width:auto;" onclick="location.reload()">Tentar novamente</button></div>`;
      }
    };

    fetchProduct();

  })();
  </script>
</body>
</html>
