<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Fundo suave -->
  <rect width="80" height="80" rx="18" fill="#dcfce7"/>

  <!-- Tampa do pote -->
  <rect x="18" y="20" width="44" height="10" rx="5" fill="#16A34A"/>
  <rect x="22" y="23" width="36" height="4" rx="2" fill="#15803D"/>

  <!-- Corpo do pote -->
  <rect x="16" y="29" width="48" height="32" rx="6" fill="#22C55E"/>

  <!-- Reflexo lateral esquerdo -->
  <rect x="19" y="31" width="6" height="28" rx="3" fill="#4ADE80" opacity="0.5"/>

  <!-- Faixa decorativa no pote -->
  <rect x="16" y="42" width="48" height="10" rx="0" fill="#16A34A"/>

  <!-- Texto "W" no pote (estilizado) -->
  <text x="40" y="50" font-family="Arial Black, Arial, sans-serif" font-size="9" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1">WHEY</text>

  <!-- Tampa superior arredondada -->
  <rect x="22" y="17" width="36" height="6" rx="3" fill="#15803D"/>

  <!-- Colher de medição -->
  <ellipse cx="57" cy="62" rx="7" ry="4" fill="#4ADE80" transform="rotate(-30 57 62)"/>
  <line x1="57" y1="62" x2="65" y2="54" stroke="#4ADE80" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pílulas / cápsulas pequenas na frente -->
  <ellipse cx="28" cy="64" rx="5" ry="3" fill="#A3E635" transform="rotate(-20 28 64)"/>
  <ellipse cx="38" cy="66" rx="5" ry="3" fill="#86EFAC" transform="rotate(10 38 66)"/>
</svg>
